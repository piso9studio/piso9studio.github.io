<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Piso9 Studio</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .nf {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-align: center;
      padding: 32px;
      box-sizing: border-box;
    }
    .nf-code {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(64px, 14vw, 140px);
      font-weight: 700;
      line-height: 1;
    }
    .nf-msg {
      margin: 0;
      font-family: var(--font-mono);
      font-size: 22px;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .nf-back {
      font-family: var(--font-mono);
      font-size: 20px;
      letter-spacing: 0.1em;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="nf">
    <h1 class="nf-code">4<span style="color:var(--accent)">0</span>4</h1>
    <p class="nf-msg">NO SIGNAL ON THIS CHANNEL</p>
    <a class="nf-back" href="/">[ BACK TO CH 9 ]</a>
  </main>
</body>
</html>
